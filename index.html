<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邢朗曦 & 潘铮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(ellipse at center, #1a0a0f 0%, #0d0508 50%, #050103 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', 'Georgia', 'Songti SC', 'STSong', serif;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }

  .main {
    z-index: 10;
    text-align: center;
    position: relative;
  }

  .ampersand-wrap {
    position: relative;
    display: inline-block;
  }

  .ampersand {
    font-size: clamp(60px, 12vw, 140px);
    font-weight: 700;
    font-style: italic;
    background: linear-gradient(135deg, #f7d794 0%, #e8b86d 25%, #fceabb 50%, #d4a05a 75%, #f7d794 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
    display: block;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(232,184,109,0.5));
  }

  .names {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 3vw, 30px);
    margin-top: -10px;
  }

  .name {
    font-size: clamp(24px, 5vw, 56px);
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #f0d9b5;
    text-shadow: 0 0 40px rgba(240,217,181,0.4), 0 0 80px rgba(240,217,181,0.2);
    animation: nameGlow 4s ease-in-out infinite;
  }

  .name:last-child { animation-delay: 0.5s; }

  .divider {
    width: clamp(40px, 8vw, 80px);
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8b86d, transparent);
    margin: clamp(16px, 3vw, 30px) auto;
  }

  .subtitle {
    font-size: clamp(12px, 2vw, 18px);
    color: rgba(240,217,181,0.6);
    letter-spacing: 0.25em;
    font-family: 'Georgia', 'Songti SC', 'STSong', serif;
    animation: fadeInUp 2s ease-out both;
    animation-delay: 0.8s;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% center; }
    50% { background-position: 200% center; }
  }

  @keyframes nameGlow {
    0%, 100% { text-shadow: 0 0 40px rgba(240,217,181,0.4), 0 0 80px rgba(240,217,181,0.2); }
    50% { text-shadow: 0 0 60px rgba(240,217,181,0.7), 0 0 120px rgba(240,217,181,0.4), 0 0 180px rgba(232,184,109,0.3); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Music button ---- */
  .music-btn {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(232,184,109,0.4);
    background: rgba(20,8,12,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
    outline: none;
  }
  .music-btn:hover {
    border-color: rgba(232,184,109,0.8);
    box-shadow: 0 0 20px rgba(232,184,109,0.3);
  }
  .music-btn svg {
    width: 18px;
    height: 18px;
    transition: all 0.3s ease;
  }
  .music-btn.playing svg {
    animation: musicPulse 1.2s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .music-note {
    position: fixed;
    top: 28px;
    right: 80px;
    z-index: 100;
    color: rgba(232,184,109,0.7);
    font-size: 12px;
    letter-spacing: 0.15em;
    font-family: 'Georgia', 'Songti SC', serif;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .music-note.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Background Music -->
<audio id="bgm" loop preload="auto"
  src="loveling.m4a">
</audio>
<button class="music-btn playing" id="musicBtn" title="音乐开关">
  <svg id="musicIconOn" viewBox="0 0 24 24" fill="none" stroke="rgba(232,184,109,0.9)" stroke-width="1.5">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
  <svg id="musicIconOff" viewBox="0 0 24 24" fill="none" stroke="rgba(232,184,109,0.4)" stroke-width="1.5" style="display:none">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
    <line x1="2" y1="2" x2="22" y2="22" stroke="rgba(200,100,100,0.6)" stroke-width="1.5"/>
  </svg>
</button>
<span class="music-note show" id="musicNote">恋爱ing — 五月天</span>

<div class="main">
  <div class="names">
    <span class="name">邢朗曦</span>
  </div>
  <div class="ampersand-wrap">
    <span class="ampersand">&</span>
  </div>
  <div class="names">
    <span class="name">潘铮</span>
  </div>
  <div class="divider"></div>
  <div class="subtitle">F O R E V E R</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Music control ----
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
const musicIconOn = document.getElementById('musicIconOn');
const musicIconOff = document.getElementById('musicIconOff');
const musicNote = document.getElementById('musicNote');
let musicPlaying = true;

// Try autoplay
bgm.volume = 0.35;
const playPromise = bgm.play();
if (playPromise !== undefined) {
  playPromise.catch(() => {
    // Browser blocked autoplay — show paused state
    musicPlaying = false;
    musicBtn.classList.remove('playing');
    musicIconOn.style.display = 'none';
    musicIconOff.style.display = '';
  });
}

musicBtn.addEventListener('click', () => {
  if (musicPlaying) {
    bgm.pause();
    musicPlaying = false;
    musicBtn.classList.remove('playing');
    musicIconOn.style.display = 'none';
    musicIconOff.style.display = '';
    musicNote.classList.remove('show');
  } else {
    bgm.play().catch(() => {});
    musicPlaying = true;
    musicBtn.classList.add('playing');
    musicIconOn.style.display = '';
    musicIconOff.style.display = 'none';
    musicNote.classList.add('show');
    setTimeout(() => musicNote.classList.remove('show'), 3000);
  }
});

// ---- Particle system ----
const particles = [];
const PARTICLE_COUNT = 120;

class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 20;
    this.size = Math.random() * 2.5 + 0.8;
    this.speedY = -(Math.random() * 0.6 + 0.2);
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.7 + 0.3;
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
    this.hue = Math.random() < 0.5 ? 40 + Math.random() * 15 : 350 + Math.random() * 20;
    this.life = Math.random() * 300 + 200;
    this.age = 0;
  }
  update() {
    this.age++;
    if (this.age > this.life) { this.reset(); this.age = 0; }
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.age * 0.02) * 0.3;
    this.twinkle += this.twinkleSpeed;
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
  }
  draw(ctx) {
    const alpha = this.opacity * (0.6 + 0.4 * Math.sin(this.twinkle));
    const fade = 1 - (this.age / this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 70%, 75%, ${alpha * fade})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 60%, 70%, ${alpha * fade * 0.15})`;
    ctx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// ---- Hearts ----
const hearts = [];
const HEART_COUNT = 18;

function heartPath(x, y, s) {
  ctx.beginPath();
  const topY = y - s * 0.35;
  ctx.moveTo(x, y + s * 0.6);
  ctx.bezierCurveTo(x - s, y + s * 0.1, x - s * 0.5, y - s * 0.7, x, topY);
  ctx.bezierCurveTo(x + s * 0.5, y - s * 0.7, x + s, y + s * 0.1, x, y + s * 0.6);
  ctx.closePath();
}

class Heart {
  constructor() {
    this.reset(true);
  }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 60;
    this.size = Math.random() * 14 + 8;
    this.speedY = -(Math.random() * 0.5 + 0.15);
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.wobbleAmp = Math.random() * 0.6 + 0.2;
    this.wobbleFreq = Math.random() * 0.02 + 0.008;
    this.opacity = Math.random() * 0.5 + 0.25;
    this.hue = Math.random() < 0.5 ? 350 + Math.random() * 15 : 340 + Math.random() * 10;
    this.age = 0;
    this.life = Math.random() * 500 + 400;
    this.rotation = (Math.random() - 0.5) * 0.5;
  }
  update() {
    this.age++;
    if (this.age > this.life) { this.reset(); this.age = 0; }
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.age * this.wobbleFreq) * this.wobbleAmp;
    if (this.x < -30) this.reset(true);
    if (this.x > W + 30) this.reset(true);
  }
  draw(ctx) {
    const fade = this.age < 60 ? this.age / 60 : (this.life - this.age < 60 ? (this.life - this.age) / 60 : 1);
    const alpha = this.opacity * fade;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 1.4);
    grad.addColorStop(0, `hsla(${this.hue}, 80%, 65%, ${alpha})`);
    grad.addColorStop(0.6, `hsla(${this.hue}, 70%, 55%, ${alpha * 0.6})`);
    grad.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`);
    heartPath(0, 0, this.size);
    ctx.fillStyle = grad;
    ctx.fill();
    heartPath(0, 0, this.size);
    ctx.strokeStyle = `hsla(${this.hue}, 70%, 75%, ${alpha * 0.5})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }
}

for (let i = 0; i < HEART_COUNT; i++) hearts.push(new Heart());

// ---- Floating petals ----
const petals = [];
const PETAL_COUNT = 25;
class Petal {
  constructor() {
    this.reset(true);
  }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 30;
    this.size = Math.random() * 6 + 2;
    this.speedY = -(Math.random() * 0.3 + 0.1);
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
    this.opacity = Math.random() * 0.3 + 0.1;
    this.age = 0;
    this.life = Math.random() * 600 + 500;
  }
  update() {
    this.age++;
    if (this.age > this.life) { this.reset(); this.age = 0; }
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.age * 0.015) * 0.5;
    this.rotation += this.rotSpeed;
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
  }
  draw(ctx) {
    const fade = this.age < 80 ? this.age / 80 : (this.life - this.age < 80 ? (this.life - this.age) / 80 : 1);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.size / 6, this.size / 6);
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,140,150,${this.opacity * fade})`;
    ctx.fill();
    ctx.restore();
  }
}
for (let i = 0; i < PETAL_COUNT; i++) petals.push(new Petal());

// ---- Sparkles around text ----
const sparkles = [];
const SPARKLE_COUNT = 15;
for (let i = 0; i < SPARKLE_COUNT; i++) {
  sparkles.push({
    x: 0, y: 0,
    targetX: 0, targetY: 0,
    size: Math.random() * 2 + 1.5,
    delay: Math.random() * 3,
    speed: Math.random() * 0.02 + 0.01,
    phase: Math.random() * Math.PI * 2,
    opacity: 0
  });
}

function drawSparkles(time) {
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const r = Math.max(rect.width, rect.height) * 0.55;

  sparkles.forEach((s, i) => {
    const angle = s.phase + time * s.speed * 0.001;
    s.targetX = cx + Math.cos(angle) * r * (0.5 + 0.5 * Math.sin(time * 0.0008 + i));
    s.targetY = cy + Math.sin(angle * 1.3) * r * (0.4 + 0.3 * Math.cos(time * 0.001 + i));
    s.x += (s.targetX - s.x) * 0.05;
    s.y += (s.targetY - s.y) * 0.05;
    s.opacity = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.002 + s.delay));
  });

  ctx.save();
  sparkles.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(252,234,187,${s.opacity * 0.8})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(252,234,187,${s.opacity * 0.15})`;
    ctx.fill();
    if (s.opacity > 0.6) {
      ctx.strokeStyle = `rgba(252,234,187,${s.opacity * 0.6})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(s.x - s.size * 3, s.y);
      ctx.lineTo(s.x + s.size * 3, s.y);
      ctx.moveTo(s.x, s.y - s.size * 3);
      ctx.lineTo(s.x, s.y + s.size * 3);
      ctx.stroke();
    }
  });
  ctx.restore();
}

function animate(time) {
  ctx.clearRect(0, 0, W, H);

  const vignette = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.4, W/2, H/2, Math.max(W,H)*0.75);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(5,1,3,0.55)');

  petals.forEach(p => { p.update(); p.draw(ctx); });
  particles.forEach(p => { p.update(); p.draw(ctx); });
  hearts.forEach(h => { h.update(); h.draw(ctx); });

  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  drawSparkles(time);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// ---- Click hearts ----
document.addEventListener('click', e => {
  // Don't trigger on music button
  if (e.target.closest('#musicBtn')) return;
  for (let i = 0; i < 5; i++) {
    const h = new Heart();
    h.x = e.clientX + (Math.random() - 0.5) * 40;
    h.y = e.clientY + (Math.random() - 0.5) * 20;
    h.size = Math.random() * 18 + 10;
    h.speedY = -(Math.random() * 1.5 + 0.5);
    h.speedX = (Math.random() - 0.5) * 2;
    h.opacity = 0.7;
    h.life = 150;
    h.age = 0;
    hearts.push(h);
    if (hearts.length > 60) hearts.shift();
  }
});
</script>
</body>
</html>
